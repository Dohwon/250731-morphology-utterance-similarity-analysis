<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>260212_feeling_traker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>기분추적기</h1>
      <p>웹/데스크톱 위젯이 같은 서버 데이터를 공유합니다.</p>
      <p id="health" class="sub"></p>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="check">기분 체크</button>
      <button class="tab" data-tab="history">통계/이력</button>
      <button class="tab" data-tab="chat">감정 대화</button>
    </nav>

    <section id="panel-check" class="panel active">
      <div class="row">
        <label for="entry-date">날짜</label>
        <input id="entry-date" type="date" />
      </div>
      <div id="mood-grid" class="mood-grid"></div>
      <div class="row">
        <label for="comment">코멘트</label>
        <textarea id="comment" rows="3" placeholder="선택사항: 오늘 감정의 원인을 한 줄로 남겨보세요."></textarea>
      </div>
      <div class="actions">
        <button id="save-btn" class="primary">저장</button>
        <button id="load-btn" class="ghost">불러오기</button>
      </div>
      <p id="save-message" class="message"></p>
    </section>

    <section id="panel-history" class="panel">
      <article class="summary-box">
        <h2>요약</h2>
        <ul id="summary-list"></ul>
      </article>
      <article class="summary-box">
        <h2>알림 (최근 7일만)</h2>
        <ul id="notice-list"></ul>
      </article>
      <article class="summary-box">
        <h2>기분 추세</h2>
        <canvas id="trend-canvas" width="700" height="220"></canvas>
      </article>
      <article class="summary-box">
        <h2>기록 이력</h2>
        <ul id="history-list" class="history-list"></ul>
      </article>
    </section>

    <section id="panel-chat" class="panel">
      <article class="summary-box">
        <h2>진정 페르소나 챗봇</h2>
        <p class="sub">분노/스트레스 신호가 보이면 짧게 진정 루틴을 제안합니다.</p>
        <div id="chat-box" class="chat-box"></div>
        <div class="chat-row">
          <input id="chat-input" type="text" placeholder="오늘 있었던 일을 편하게 말해보세요." />
          <button id="chat-send" class="primary">전송</button>
        </div>
        <div id="chat-source" class="sub"></div>
      </article>

      <article class="summary-box">
        <h2>대화 기반 분석</h2>
        <ul id="chat-analysis"></ul>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
